<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>website forum</title>
</head>
<body>
    <h1>VIVEK BATAR</h1>
    <h2>website form</h2>
    <form action="formdata.txt" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="eg:abc"><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="eg:abc@gmail.com"><br>
        <label for="website">website type</label><br>
        <label for="101">
        <input type="radio" id="101" value="static" name="type">static</label><br>
        <label for="102">
        <input type="radio" id="102" value="dynamic" name="type">dynamic</label><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message"></textarea><br>
        <input type="submit" value="Submit">
    </form>
    
</body>
</html>
